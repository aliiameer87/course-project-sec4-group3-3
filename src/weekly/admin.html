<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Weekly Breakdown</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <script src="admin.js" defer></script>
</head>
<body>
  <header class="container">
    <h1>Manage Weekly Breakdown</h1>
    <a href="list.html">← Back</a>
  </header>
  <main class="container">

    <section>
      <h2>Add / Edit Week</h2>
      <form id="week-form" action="#">
        <fieldset>
          <legend>Week Details</legend>

          <label for="week-title">Title</label>
          <input type="text" id="week-title" name="week-title" required />

          <label for="week-start-date">Start Date</label>
          <input type="date" id="week-start-date" name="week-start-date" required />

          <label for="week-description">Description</label>
          <textarea id="week-description" name="week-description"></textarea>

          <label for="week-links">Links (one per line)</label>
          <textarea id="week-links" name="week-links"></textarea>

          <button type="submit" id="add-week">Add Week</button>
        </fieldset>
      </form>
    </section>

    <section>
      <h2>Existing Weeks</h2>
      <table id="weeks-table">
        <thead>
          <tr>
            <th>Week Title</th>
            <th>Start Date</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="weeks-tbody"></tbody>
      </table>
    </section>

  </main>
</body>
</html>
